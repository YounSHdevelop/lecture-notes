<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>독일 히든챔피언과 창업 - 강의 노트</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-700: #374151;
      --gray-900: #111827;
      --card-bg: white;
      --nav-bg: white;
      --body-bg: #f3f4f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--body-bg);
      color: var(--gray-900);
      line-height: 1.7;
    }

    header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }
    header .chapter-tag {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 0.25rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      letter-spacing: 0.05em;
    }
    header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
    header p { opacity: 0.85; font-size: 0.95rem; }

    nav.toc {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      background: var(--nav-bg);
      padding: 1rem;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    nav.toc a {
      text-decoration: none;
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      border: 1.5px solid var(--primary-light);
      transition: background 0.2s, color 0.2s;
    }
    nav.toc a:hover { background: var(--primary); color: white; }

    .theme-toggle {
      margin-left: auto;
      background: none;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      padding: 0.3rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--gray-700);
      display: flex; align-items: center; gap: 0.4rem;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .theme-toggle:hover { border-color: var(--primary); color: var(--primary); }

    main { max-width: 720px; margin: 2rem auto; padding: 0 1rem 4rem; }

    .card-list { display: flex; flex-direction: column; gap: 1rem; }

    .card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.4rem 1.5rem;
      background: var(--card-bg);
      border-radius: 14px;
      text-decoration: none;
      color: var(--gray-900);
      border-top: 4px solid var(--primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .card.green { border-color: var(--success); }
    .card.orange { border-color: var(--warning); }
    .card.red { border-color: var(--danger); }

    .card-icon {
      width: 52px; height: 52px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800;
      flex-shrink: 0;
      background: var(--primary-light);
      color: var(--primary);
    }
    .card.green .card-icon { background: var(--success-light); color: var(--success); }
    .card.orange .card-icon { background: var(--warning-light); color: var(--warning); }
    .card.red .card-icon { background: var(--danger-light); color: var(--danger); }

    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
    .card-desc { font-size: 0.82rem; color: var(--gray-700); }

    .tags { display: flex; gap: 0.4rem; margin-top: 0.45rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.7rem; padding: 0.15rem 0.55rem; border-radius: 20px;
      background: var(--primary-light); color: var(--primary);
      font-weight: 600;
    }
    .card.green .tag { background: var(--success-light); color: var(--success); }
    .card.orange .tag { background: var(--warning-light); color: var(--warning); }

    .card-arrow {
      color: var(--gray-700); font-size: 1.3rem; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .card:hover .card-arrow { transform: translateX(4px); color: var(--primary); }

    footer {
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
      padding: 2rem;
      border-top: 1px solid var(--gray-200);
    }

    /* ── 다크 테마 ── */
    [data-theme="dark"] {
      --primary-light: #1e3a5f;
      --success-light: #14532d;
      --warning-light: #451a03;
      --danger-light:  #450a0a;
      --gray-100: #0f172a;
      --gray-200: #334155;
      --gray-700: #94a3b8;
      --gray-900: #e2e8f0;
      --card-bg: #1e293b;
      --nav-bg: #1e293b;
      --body-bg: #0f172a;
    }
    [data-theme="dark"] body { background: #0f172a; color: #e2e8f0; }
    [data-theme="dark"] nav.toc { background: #1e293b; border-color: #334155; }
    [data-theme="dark"] .card { background: #1e293b; color: #e2e8f0; }
    [data-theme="dark"] .card-desc { color: #94a3b8; }
    [data-theme="dark"] footer { color: #475569; border-color: #334155; }
    [data-theme="dark"] .theme-toggle { color: #94a3b8; border-color: #334155; }
    [data-theme="dark"] .theme-toggle:hover { color: #60a5fa; border-color: #60a5fa; }
  </style>
</head>
<body>

<header>
  <div class="chapter-tag">독일 히든챔피언과 창업 · 한신대학교 2학년 1학기</div>
  <h1>독일 히든챔피언과 창업</h1>
  <p>강의 노트 모음</p>
</header>

<nav class="toc">
  <a href="../index.html">← 강의 목록으로</a>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 야간 모드</button>
</nav>

<main>
  <div class="card-list">

    <a href="./수업정리_1~3강.html" class="card">
      <div class="card-icon">1-3</div>
      <div class="card-body">
        <div class="card-title">1강 ~ 3강 수업 정리</div>
        <div class="card-desc">독일 경제의 역사적 배경, 히든챔피언의 정의와 특징, 독일 산업구조</div>
        <div class="tags">
          <span class="tag">히든챔피언</span>
          <span class="tag">독일경제</span>
          <span class="tag">산업구조</span>
        </div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <!-- 새 강의 추가 시 아래를 복사하세요
    <a href="./수업정리_4~6강.html" class="card green">
      <div class="card-icon">4-6</div>
      <div class="card-body">
        <div class="card-title">4강 ~ 6강 수업 정리</div>
        <div class="card-desc">강의 설명</div>
        <div class="tags">
          <span class="tag">키워드</span>
        </div>
      </div>
      <span class="card-arrow">›</span>
    </a>
    -->

  </div>
</main>

<footer>
  독일 히든챔피언과 창업 · 한신대학교 2학년 1학기 | 강의 노트는 계속 추가됩니다
</footer>

<script>
  const btn = document.getElementById('themeToggle');
  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    btn.textContent = dark ? '☀️ 라이트 모드' : '🌙 야간 모드';
  }
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  }
  applyTheme(localStorage.getItem('theme') === 'dark');
</script>

</body>
</html>
