<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한신대학교 2학년 1학기 - 강의 노트</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #f472b6;
      --highlight: #fbbf24;
      --green: #4ade80;
      --orange: #fb923c;
      --red: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 3rem 2rem;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e1b4b 100%);
      border-radius: 20px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(56,189,248,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(129,140,248,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      position: relative;
    }
    .header p {
      color: var(--text-dim);
      font-size: 0.95rem;
      position: relative;
    }

    /* Card List */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.4rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 4px; height: 100%;
      border-radius: 4px 0 0 4px;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(56,189,248,0.4);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }
    .card-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .card-arrow {
      color: var(--text-dim);
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Color Variants */
    .card.c1::before { background: var(--accent); }
    .card.c1 .card-icon { background: rgba(56,189,248,0.15); color: var(--accent); }

    .card.c2::before { background: var(--accent2); }
    .card.c2 .card-icon { background: rgba(129,140,248,0.15); color: var(--accent2); }

    .card.c3::before { background: var(--accent3); }
    .card.c3 .card-icon { background: rgba(244,114,182,0.15); color: var(--accent3); }

    .card.c4::before { background: var(--highlight); }
    .card.c4 .card-icon { background: rgba(251,191,36,0.15); color: var(--highlight); }

    .card.c5::before { background: var(--green); }
    .card.c5 .card-icon { background: rgba(74,222,128,0.15); color: var(--green); }

    .card.c6::before { background: var(--orange); }
    .card.c6 .card-icon { background: rgba(251,146,60,0.15); color: var(--orange); }

    .card.c7::before { background: var(--red); }
    .card.c7 .card-icon { background: rgba(248,113,113,0.15); color: var(--red); }

    /* Disabled card for courses without notes yet */
    .card.disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .card.disabled .card-desc::after {
      content: ' (준비 중)';
      color: var(--text-dim);
      font-style: italic;
    }

    /* Section title */
    .section-title {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
      margin-top: 1.5rem;
      padding-left: 0.5rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 3rem;
      padding: 1.5rem;
      color: var(--text-dim);
      font-size: 0.8rem;
    }
  </style>
</head>

</body>
