<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-비지니스의 이해 - 강의 노트</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #475569;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #818cf8;
      --accent2: #667eea;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; margin: 0 auto; }

    /* Home Nav */
    .home-nav {
      position: sticky; top: 0; z-index: 100;
      padding: 0.8rem 0;
      margin: -2rem -1rem 1.5rem -1rem;
      padding-left: 1rem; padding-right: 1rem;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .home-nav a {
      display: inline-flex; align-items: center; gap: 0.5rem;
      text-decoration: none; color: var(--accent);
      font-size: 0.9rem; font-weight: 600;
      padding: 0.4rem 0.8rem; border-radius: 8px;
      transition: background 0.2s;
    }
    .home-nav a:hover { background: rgba(129,140,248,0.1); }

    /* Header */
    .header {
      text-align: center; margin-bottom: 2.5rem;
      padding: 3rem 2rem;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e1b4b 100%);
      border-radius: 20px; border: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(129,140,248,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(102,126,234,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .header .icon { font-size: 2.5rem; margin-bottom: 0.8rem; position: relative; }
    .header h1 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem; position: relative;
    }
    .header p { color: var(--text-dim); font-size: 0.95rem; position: relative; }

    /* Card List */
    .card-list { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      display: flex; align-items: center; gap: 1.2rem;
      padding: 1.4rem 1.5rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; text-decoration: none; color: var(--text);
      transition: all 0.25s ease; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; left: 0; top: 0;
      width: 4px; height: 100%; border-radius: 4px 0 0 4px;
      background: var(--accent);
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(129,140,248,0.4);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .card-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800; flex-shrink: 0;
      background: rgba(129,140,248,0.15); color: var(--accent);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
    .card-desc { font-size: 0.82rem; color: var(--text-dim); }
    .card-arrow {
      color: var(--text-dim); font-size: 1.2rem; flex-shrink: 0;
      transition: transform 0.2s;
    }
    .card:hover .card-arrow { transform: translateX(4px); color: var(--accent); }

    .tags { display: flex; gap: 0.4rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 6px;
      background: rgba(129,140,248,0.1); color: var(--accent);
      border: 1px solid rgba(129,140,248,0.2);
    }

    .footer {
      text-align: center; margin-top: 3rem; padding: 1.5rem;
      color: var(--text-dim); font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="home-nav">
    <a href="../index.html">&#8592; 강의 목록으로</a>
  </div>
  <div class="container">
    <div class="header">
      <div class="icon">💻</div>
      <h1>e-비지니스의 이해</h1>
      <p>강의 노트 모음</p>
    </div>

    <div class="card-list">

      <a href="./1주차_학습자료.html" class="card">
        <div class="card-icon">W1</div>
        <div class="card-body">
          <div class="card-title">1주차 - 전자상거래란 무엇인가?</div>
          <div class="card-desc">e-Commerce와 e-Business 핵심 개념 정리</div>
          <div class="tags">
            <span class="tag">전자상거래</span>
            <span class="tag">e-Business</span>
          </div>
        </div>
        <span class="card-arrow">›</span>
      </a>

      <!-- 새 주차 추가 시 아래를 복사하세요
      <a href="./2주차_학습자료.html" class="card">
        <div class="card-icon">W2</div>
        <div class="card-body">
          <div class="card-title">2주차 - 제목</div>
          <div class="card-desc">설명</div>
          <div class="tags">
            <span class="tag">키워드</span>
          </div>
        </div>
        <span class="card-arrow">›</span>
      </a>
      -->

    </div>

    <div class="footer">
      2025-1학기 · 강의 노트는 계속 추가됩니다
    </div>
  </div>
</body>
</html>
